# GitHub Actions workflow — auto-summarize PR changes.
#
# Add to: .github/workflows/summarize.yml
#
# This runs on every PR push and posts summaries as a PR comment.
# All files in the PR share one cache session for maximum KV-cache reuse.

name: "Code Summarization"

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install glm-summarizer
        run: |
          pip install git+https://github.com/your-org/glm-summarizer.git
          # Or if vendored in-repo:
          # pip install -e ./tools/glm-summarizer

      - name: Get changed files
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed.txt
          echo "count=$(wc -l < changed.txt)" >> $GITHUB_OUTPUT

      - name: Summarize changed files
        env:
          MAAS_API_KEY: ${{ secrets.MAAS_API_KEY }}
          MAAS_MODEL: glm-5.1
        run: |
          # Filter source files
          grep -E '\.(py|js|ts|go|rs|java|cpp|rb)$' changed.txt > to_summarize.txt || true
          COUNT=$(wc -l < to_summarize.txt)
          if [ "$COUNT" -eq 0 ]; then
            echo "No source files to summarize"
            exit 0
          fi
          if [ "$COUNT" -gt 30 ]; then
            echo "Too many files ($COUNT), sampling 30"
            shuf -n 30 to_summarize.txt > sampled.txt
            mv sampled.txt to_summarize.txt
          fi
          echo "Summarizing $(wc -l < to_summarize.txt) files..."
          glm-summarize batch "$(tr '\n' ' ' < to_summarize.txt)" \
            --template pr-diff \
            --format markdown \
            --output summaries/

      - name: Post summary comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'summaries/';
            if (!fs.existsSync(dir)) return;
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));
            if (files.length === 0) return;

            let body = '## Code Summary\n\n';
            for (const f of files.slice(0, 15)) {
              const content = fs.readFileSync(path.join(dir, f), 'utf8');
              body += `### ${f.replace('.md', '')}\n\n${content.substring(0, 800)}\n\n`;
            }
            if (files.length > 15) {
              body += `\n*... and ${files.length - 15} more files*\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
